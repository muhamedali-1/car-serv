<!DOCTYPE html>
<html>
<head>
<title>Dashboard Pro</title>

<style>
/* نفس الستايل بتاعك بدون تغيير */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center center/cover;
    min-height:100vh;
}

.overlay{
    background: rgba(0,0,0,0.72);
    min-height:100vh;
    width:100%;
    padding:20px;
    color:white;
}

.navbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    padding:15px 40px;
    position:sticky;
    top:0;
    z-index:1000;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size:24px;
    font-weight:bold;
    color:#ff3b3b;
}

.nav-links {
    display:flex;
    gap:25px;
}
.nav-links a {
    text-decoration:none;
    color:white;
    font-weight:bold;
    position:relative;
    transition:0.3s;
}

.nav-links a:hover {
    color:#ff3b3b;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:#ff3b3b;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

h2{
    text-align:center;
    margin:25px 0;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.stat-box{
    background: rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    min-width:160px;
    text-align:center;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:25px 0;
}

.search-box input{
    padding:10px;
    border:none;
    border-radius:10px;
}

.search-box button{
    padding:10px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:260px;
    background: rgba(255,255,255,0.08);
    padding:15px;
    border-radius:15px;
}

button{
    margin:5px;
    padding:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.view{background:green;color:white;}
.edit{background:orange;color:white;}
.delete{background:red;color:white;}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">🚗 CarServ Pro</div>

    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="add.html">Add Cars</a>
        <a href="search.html">Search</a>
    </div>
</div>

<div class="overlay">

<h2>📊 Car Dashboard Pro</h2>

<div class="stats">
    <div class="stat-box">
        <h3 id="carsCount">0</h3>
        <p>عدد العربيات</p>
    </div>

    <div class="stat-box">
        <h3 id="faultsCount">0</h3>
        <p>عدد العمليات</p>
    </div>
</div>

<div class="search-box">
    <input id="searchBox" placeholder="ابحث برقم الشاسيه">
    <button onclick="searchCar()">بحث</button>
</div>

<div id="container"></div>

</div>

<script>

/* 🔐 check login */
if(!localStorage.getItem("role")){
    window.location.href = "login.html";
}

let role = localStorage.getItem("role");
let userChassis = localStorage.getItem("customerChassis");

let cars = JSON.parse(localStorage.getItem("cars")) || [];

/* 📊 stats */
function updateStats(){

    if(role === "customer"){
        document.querySelector(".stats").style.display = "none";
        document.querySelector(".search-box").style.display = "none";
        return;
    }

    document.getElementById("carsCount").innerText = cars.length;

    let operations = 0;
    cars.forEach(c=>{
        if(c.history){
            operations += c.history.length;
        }
    });

    document.getElementById("faultsCount").innerText = operations;
}

/* 🚗 load cars */
function loadCars(list = cars){

    let html = "";

    list.forEach((car)=>{

        if(role === "customer" && car.chassisNumber !== userChassis){
            return;
        }

        html += `
        <div class="card">
            <p><b>👤</b> ${car.ownerName || "-"}</p>
            <p><b>🚗</b> ${car.carType || "-"}</p>
            <p><b>🔢</b> ${car.chassisNumber || "-"}</p>

            <button class="view" onclick="viewCar('${car.chassisNumber}')">تفاصيل</button>
        `;

        if(role === "admin"){
            html += `
                <button class="edit" onclick="editCar('${car.chassisNumber}')">تعديل</button>
                <button class="delete" onclick="deleteCar('${car.chassisNumber}')">حذف</button>
            `;
        }

        html += `</div>`;
    });

    if(html === ""){
        html = "<p style='text-align:center'>لا توجد عربيات</p>";
    }

    document.getElementById("container").innerHTML = html;

    updateStats();
}

/* 🔍 search */
function searchCar(){
    let val = document.getElementById("searchBox").value.toLowerCase();

    let result = cars.filter(c =>
        (c.chassisNumber || "").toLowerCase().includes(val)
    );

    loadCars(result);
}

/* ❌ delete */
function deleteCar(chassis){

    if(!confirm("هل أنت متأكد من الحذف؟")){
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    cars = cars.filter(c => c.chassisNumber !== chassis);
    users = users.filter(u => u.chassisNumber !== chassis);

    localStorage.setItem("cars", JSON.stringify(cars));
    localStorage.setItem("users", JSON.stringify(users));

    alert("✔ تم الحذف");

    loadCars();
}

/* ✏️ edit */
function editCar(ch){

    let car = cars.find(c => c.chassisNumber === ch);

    if(!car){
        alert("العربية غير موجودة");
        return;
    }

    let newName = prompt("اسم المالك", car.ownerName);
    let newType = prompt("نوع العربية", car.carType);

    if(newName) car.ownerName = newName;
    if(newType) car.carType = newType;

    localStorage.setItem("cars", JSON.stringify(cars));

    loadCars();
}

/* 📄 view */
function viewCar(chassis){

    let car = cars.find(c => c.chassisNumber === chassis);

    if(!car){
        alert("العربية غير موجودة");
        return;
    }

    localStorage.setItem("selectedCar", JSON.stringify(car));

    window.location.href = "details.html";
}

/* ⌨️ enter search */
document.getElementById("searchBox")
.addEventListener("keypress", function(e){
   if(e.key === "Enter"){
      searchCar();
   }
});

/* init */
if(role === "customer"){
    loadCars(cars.filter(c => c.chassisNumber === userChassis));
}else{
    loadCars();
}

</script>

</body>
</html>
