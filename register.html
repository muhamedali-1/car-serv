<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CarServ - Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* ================= BACKGROUND ================= */
body{
    height:100vh;
    background: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

/* ================= OVERLAY ================= */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.65);
}

/* ================= GLASS BOX ================= */
.box{
    position:relative;
    z-index:2;

    width:340px;

    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);

    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;

    padding:30px;
    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h2{
    margin-bottom:20px;
    color:#ff3b3b;
}

/* ================= INPUTS ================= */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;

    background:rgba(255,255,255,0.08);
    color:#fff;
    outline:none;
}

/* ================= BUTTONS ================= */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

/* register */
.register-btn{
    background:linear-gradient(45deg,#ff3b3b,#ff0000);
    color:white;
}

/* back */
.back-btn{
    background:rgba(52,152,219,0.9);
    color:white;
    margin-top:10px;
}

/* hover */
button:hover{
    transform:scale(1.05);
}

/* message */
#msg{
    margin-top:10px;
    font-size:14px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="box">
    <h2>🚗 إنشاء حساب</h2>

    <input id="newUser" placeholder="Username">
    <input id="newPass" type="password" placeholder="Password">
    <input id="chassis" placeholder="رقم الشاسيه">

    <button class="register-btn" onclick="register()">Register</button>

    <button class="back-btn" onclick="window.location.href='login.html'">
        رجوع
    </button>

    <p id="msg"></p>
</div>

<script>

function register(){

    let username = document.getElementById("newUser").value;
    let password = document.getElementById("newPass").value;
    let chassis = document.getElementById("chassis").value;

    let msg = document.getElementById("msg");

    if(username === "" || password === "" || chassis === ""){
        msg.innerText = "❌ املأ كل البيانات";
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let cars = JSON.parse(localStorage.getItem("cars")) || [];

    let car = cars.find(c => c.chassisNumber === chassis);

    if(!car){
        msg.innerText = "❌ رقم الشاسيه غير مسجل في النظام";
        return;
    }

    let exist = users.find(u => u.username === username);

    if(exist){
        msg.innerText = "⚠️ اسم المستخدم موجود بالفعل";
        return;
    }

    if(username.length < 3){
        msg.innerText = "❌ اسم المستخدم قصير جدًا";
        return;
    }

    if(password.length < 6){
        msg.innerText = "❌ كلمة المرور لازم تكون 6 أحرف على الأقل";
        return;
    }

    if(!/[0-9]/.test(password)){
        msg.innerText = "❌ لازم تحتوي على رقم";
        return;
    }

    users.push({
        username: username,
        password: password,
        role: "customer",
        chassisNumber: chassis
    });

    localStorage.setItem("users", JSON.stringify(users));

    msg.style.color = "#2ecc71";
    msg.innerText = "✅ تم إنشاء الحساب بنجاح";

    setTimeout(()=>{
        window.location.href = "login.html";
    },1500);
}

</script>

</body>
</html>
