<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarServ - Add Car</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* ================= BACKGROUND ================= */
body{
    background: url("https://images.unsplash.com/photo-1503376780353-7e6692767b70") no-repeat center center/cover;
    min-height:100vh;
    color:#fff;
}

/* ================= OVERLAY ================= */
.overlay{
    background: rgba(0,0,0,0.65);
    min-height:100vh;
}

/* ================= NAVBAR (UNCHANGED) ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;

    position:fixed;
    width:100%;
    top:0;
    left:0;
    z-index:1000;

    /* 🔥 FIX */
    background: rgba(15,15,15,0.85);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff3b3b;
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-weight:500;
    transition:0.3s;
    position:relative;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:#ff3b3b;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

.nav-links a:hover{
    color:#ff3b3b;
}

/* ================= FORM ================= */
.container{
    width:450px;
    margin:120px auto;
    background:rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;
    padding:30px;
}

.container h2{
    text-align:center;
    margin-bottom:20px;
    color:#ff3b3b;
}

/* INPUTS */
input, select{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
}

option{
    background:#111;
    color:#fff;
}

button{
    width:100%;
    padding:14px;
    background:linear-gradient(45deg,#ff3b3b,#ff0000);
    color:#fff;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
    .container{
        width:90%;
    }
}
</style>
</head>

<body>

<div class="overlay">

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🚗 CarServ</div>

    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="mn.html">About Us</a>
        <a href="add.html">Add Cars</a>
        <a href="search.html">Search</a>
    </div>
</div>

<!-- FORM -->
<div class="container">

<h2>تسجيل بيانات العربية</h2>

<form id="carForm">

<input type="text" id="ownerName" placeholder="اسم صاحب العربية" required>
<input type="text" id="carType" placeholder="نوع العربية" required>
<input type="number" id="model" placeholder="موديل العربية" required>

<!-- 🚗 NEW: ODOMETER -->
<input type="number" id="km" placeholder="عداد الكيلومترات (KM)" required>

<input type="text" id="chassisNumber" placeholder="رقم الشاسيه" required>

<!-- FAULT TYPE -->
<select id="faultType" onchange="showOptions()">
    <option value="">اختر نوع العطل</option>
    <option value="suspension">عفشة</option>
    <option value="engine">ميكانيكا</option>
    <option value="oil">تغيير زيت</option>
    <option value="computer">فحص كمبيوتر</option>
</select>

<div id="subOptions"></div>

<button type="submit">حفظ</button>

</form>

</div>

</div>

<script>

/* ================= SHOW OPTIONS ================= */
function showOptions(){

    let type = document.getElementById("faultType").value;
    let box = document.getElementById("subOptions");

    box.innerHTML = "";

    let baseOptions = [];

    if(type === "suspension"){
        baseOptions = ["مساعدين","بطاحات","مقصات","كبالن"];
    }
    else if(type === "engine"){
        baseOptions = ["سحب ضعيف","تقطيع موتور","بوجيهات"];
    }
    else if(type === "oil"){
        baseOptions = ["تغيير زيت موتور","فلتر زيت","زيت فتيس"];
    }
    else if(type === "computer"){
        baseOptions = ["فحص ECU","Reset كمبيوتر","قراءة حساسات"];
    }

    let saved = JSON.parse(localStorage.getItem(type+"_faults")) || [];
    let allOptions = [...baseOptions, ...saved];

    if(type){
        box.innerHTML = `
            <select id="fault">
                ${allOptions.map(i=>`<option value="${i}">${i}</option>`).join("")}
            </select>

            <input id="newFaultInput" placeholder="لو مش موجود العطل اكتبه هنا">

            <button type="button" onclick="addNewFault('${type}')" style="background:#333;">
                ➕ إضافة عطل جديد
            </button>
        `;
    }
}

/* ================= ADD NEW FAULT ================= */
function addNewFault(type){

    let input = document.getElementById("newFaultInput");
    let value = input.value.trim();

    if(!value){
        alert("اكتب العطل الأول");
        return;
    }

    let saved = JSON.parse(localStorage.getItem(type+"_faults")) || [];

    if(!saved.includes(value)){
        saved.push(value);
        localStorage.setItem(type+"_faults", JSON.stringify(saved));
    }

    alert("✔ تم إضافة العطل");

    showOptions();
}

/* ================= SAVE CAR (UPDATED) ================= */
document.getElementById("carForm").addEventListener("submit", function(e){
    e.preventDefault();

    let cars = JSON.parse(localStorage.getItem("cars")) || [];

    const chassis = document.getElementById("chassisNumber").value;

    let faultType = document.getElementById("faultType").value;
    if(!faultType){
        alert("اختار نوع العطل");
        return;
    }

    let faultEl = document.getElementById("fault");
    let faultValue = faultEl ? faultEl.value : "";

    let now = new Date();

    let faultObject = faultValue ? {
        text: faultValue,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString()
    } : null;

    let car = cars.find(c => c.chassisNumber === chassis);

    if (car) {

        if(!car.faults){
            car.faults = [];
        }

        if (faultObject){
            car.faults.push(faultObject);
        }

    } else {

        cars.push({
            ownerName: document.getElementById("ownerName").value,
            carType: document.getElementById("carType").value,
            model: Number(document.getElementById("model").value),
            km: Number(document.getElementById("km").value),
            chassisNumber: chassis,
            faults: faultObject ? [faultObject] : []
        });
    }

    localStorage.setItem("cars", JSON.stringify(cars));

    alert("تم حفظ العربية ✔");

    this.reset();
    document.getElementById("subOptions").innerHTML = "";
});
</script>

</body>
</html>
