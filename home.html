<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarServ - About</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#0f0f0f;
    color:#fff;
}

/* ================= NAVBAR FIX ================= */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:15px 50px;

    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;

    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LOGO LEFT */
.logo{
    font-size:26px;
    font-weight:bold;
    color:#ff3b3b;
}

/* LINKS RIGHT */
.nav-links{
    display:flex;
    align-items:center;
    gap:25px;
    margin-left:auto;
}

.nav-links a{
    text-decoration:none;
    color:#fff;
    font-weight:500;
    position:relative;
    transition:0.3s;
}

.nav-links a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:#ff3b3b;
    transition:0.3s;
}

.nav-links a:hover::after{
    width:100%;
}

.nav-links a:hover{
    color:#ff3b3b;
}

/* BUTTON */
.btn{
    background:linear-gradient(45deg,#ff3b3b,#ff0000);
    color:#fff;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

/* ================= HERO ================= */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover no-repeat;
    display:flex;
    align-items:center;
    padding:0 80px;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

.hero-content{
    position:relative;
    max-width:650px;
}

.hero h1{
    font-size:60px;
    margin-bottom:15px;
    background:linear-gradient(45deg,#fff,#ff3b3b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    font-size:18px;
    margin-bottom:25px;
    color:#ddd;
}

.hero button{
    background:linear-gradient(45deg,#ff3b3b,#ff0000);
    color:white;
    padding:14px 28px;
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:10px;
    transition:0.3s;
}

.hero button:hover{
    transform:scale(1.08);
}

/* ================= RESPONSIVE ================= */
@media(max-width:768px){
    .navbar{
        padding:15px 20px;
    }

    .hero{
        padding:0 20px;
        text-align:center;
        justify-content:center;
    }

    .hero h1{
        font-size:40px;
    }

    .nav-links{
        gap:15px;
        font-size:14px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">🚗 CarServ</div>

    <div class="nav-links">
        <a href="mn.html">About Us</a>
        <a href="add.html">Add Cars</a>
        <a href="search.html">Search</a>

        <button onclick="logout()" class="btn">Logout</button>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>Premium Car Service</h1>
        <p>Manage your vehicles, book services, and track everything easily with our smart system.</p>

        <button onclick="window.location.href='booking.html'">
            Start Now
        </button>
    </div>
</div>

<script>
function logout(){
    localStorage.removeItem("role");
    localStorage.removeItem("customerName");
    localStorage.removeItem("customerChassis");
    window.location.href = "login.html";
}
</script>

</body>
</html>
